  .vignette{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background:radial-gradient(120% 80% at 50% 42%, transparent 56%, rgba(2,2,8,.55) 100%);
  }

  .stage{
    position:fixed; inset:0; z-index:3;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; pointer-events:none;
    padding:0 28px; padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
    animation:floatY 9s ease-in-out 2.4s infinite;   /* 极慢呼吸浮动，不再像死板 PPT */
  }
  @keyframes floatY{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-7px); } }
  .rise{ opacity:0; transform:translateY(18px); filter:blur(6px);
         animation:rise 1.5s cubic-bezier(.2,.7,.2,1) forwards; }
  @keyframes rise{ to{ opacity:1; transform:none; filter:blur(0); } }

  .eyebrow{
    font-family:"Snell Roundhand","Apple Chancery","Savoye LET","Brush Script MT",cursive;
    font-size:clamp(30px,9.5vw,52px); font-weight:600; font-style:italic; letter-spacing:.5px;
    background:linear-gradient(180deg,var(--gold-hi),var(--gold) 55%,var(--gold-deep));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
    filter:drop-shadow(0 3px 16px rgba(246,200,110,.4)); animation-delay:.25s;
  }
  .name{
    margin-top:.04em; font-family:"HD","Kaiti SC","STKaiti",serif;
    font-size:clamp(108px,35vw,196px); line-height:1; letter-spacing:.1em; text-indent:.1em;
    background:linear-gradient(175deg,#fff7da 0%,var(--gold) 38%,#e6b552 62%,var(--gold-deep) 100%);
    background-size:100% 240%;
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
    filter:drop-shadow(0 0 30px rgba(246,180,80,.45)) drop-shadow(0 4px 12px rgba(0,0,0,.55));
    animation:rise 1.7s cubic-bezier(.2,.7,.2,1) forwards, shimmer 6s ease-in-out 1.6s infinite;
    animation-delay:.5s;
  }
  @keyframes shimmer{ 0%,100%{ background-position:50% 0%; } 50%{ background-position:50% 100%; } }
  .greet{
    margin-top:.34em; font-family:"HD","Kaiti SC","STKaiti",serif;
    font-size:clamp(34px,10vw,52px); letter-spacing:.3em; text-indent:.3em;
    color:#fbe9bf; text-shadow:0 0 18px rgba(246,190,110,.45); animation-delay:.8s;
  }
  .rule{ display:flex; align-items:center; gap:14px; margin:1.45em 0 1.1em;
         color:var(--gold); opacity:.85; animation-delay:1.05s; }
  .rule i{ display:block; width:clamp(40px,16vw,84px); height:1px;
           background:linear-gradient(90deg,transparent,rgba(246,210,122,.85)); }
  .rule i:last-child{ background:linear-gradient(270deg,transparent,rgba(246,210,122,.85)); }
  .rule b{ font-style:normal; font-size:11px; transform:translateY(-1px);
           filter:drop-shadow(0 0 8px rgba(246,200,110,.7)); }
  .poem{ font-family:"HD","Kaiti SC","STKaiti",serif; font-size:clamp(19px,5.6vw,26px);
         letter-spacing:.2em; text-indent:.2em; color:rgba(248,224,176,.9);
         text-shadow:0 1px 10px rgba(0,0,0,.5); animation-delay:1.15s;
         min-height:1.5em; white-space:nowrap;
         transition:opacity .5s ease, transform .5s ease, filter .5s ease; }
  .poem .pc{ display:inline-block; animation:pcIn .6s cubic-bezier(.2,.7,.2,1) backwards; }
  @keyframes pcIn{
    0%{ opacity:0; transform:translateY(12px) scale(.92); filter:blur(5px); }
    60%{ filter:blur(0); }
    100%{ opacity:1; transform:none; filter:none; } }
  .bless{ margin-top:1.05em; font-family:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
          font-size:clamp(12.5px,3.7vw,15px); font-weight:300; letter-spacing:.16em; text-indent:.16em;
          color:rgba(255,221,210,.62); line-height:1.9; animation-delay:1.4s; }

  .hint{
    position:fixed; left:0; right:0; z-index:3; bottom:calc(env(safe-area-inset-bottom) + 24px);
    text-align:center; pointer-events:none;
    font-family:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
    font-size:12.5px; letter-spacing:.28em; text-indent:.28em; color:rgba(255,205,200,.5);
    opacity:0; transition:opacity .6s ease; animation:hintIn 1.2s ease 2.1s forwards;
  }
  @keyframes hintIn{ to{ opacity:.6; } }

  /* 音乐开关 */
  .mbtn{
    position:fixed; top:calc(env(safe-area-inset-top) + 14px); right:16px; z-index:5;
    width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.05); border:1px solid rgba(246,210,122,.32);
    color:#f6d27a; font-size:18px; cursor:pointer; pointer-events:auto;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    box-shadow:0 2px 16px rgba(0,0,0,.35); transition:transform .15s ease, opacity .4s ease;
    opacity:0; animation:hintIn .8s ease 1.6s forwards;
  }
  .mbtn:active{ transform:scale(.9); }
  .mbtn.pulse{ animation:hintIn .8s ease forwards, mpulse 2.2s ease-in-out 2s infinite; }
  @keyframes mpulse{ 0%,100%{ box-shadow:0 2px 16px rgba(0,0,0,.35);} 50%{ box-shadow:0 0 18px rgba(246,210,122,.6);} }

  /* 计数器 / 连击 / 飘字 */
  .score{
    position:fixed; left:16px; bottom:calc(env(safe-area-inset-bottom) + 18px); z-index:5;
    font-family:"PingFang SC",-apple-system,sans-serif; font-size:13px; letter-spacing:1px;
    color:rgba(255,225,210,.82); background:rgba(255,255,255,.05); border:1px solid rgba(246,210,122,.25);
    padding:7px 13px; border-radius:20px; pointer-events:none;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    opacity:0; animation:hintIn .8s ease 1.8s forwards;
  }
  .score b{ display:inline-block; color:#f6d27a; font-size:14px; min-width:12px; text-align:center; }
  .score b.pop{ animation:pop .36s ease; }
  @keyframes pop{ 0%{transform:scale(1)} 40%{transform:scale(1.55); color:#fff} 100%{transform:scale(1)} }

  .combo{
    position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 74px); z-index:6;
    pointer-events:none; white-space:nowrap;
    font-family:"PingFang SC",sans-serif; font-weight:700; font-size:21px; color:#ffd36b;
    background:rgba(10,7,18,.42); border-radius:14px; padding:5px 15px;
    -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
    text-shadow:0 0 14px rgba(246,180,80,.75);
    opacity:0; transform:translate(-50%,8px) scale(.9); transition:all .2s ease;
  }
  .combo.show{ opacity:1; transform:translate(-50%,0) scale(1); }

  .toast{
    position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 116px); z-index:6;
    max-width:88vw; text-align:center; pointer-events:none;
    font-family:"PingFang SC",sans-serif; font-size:15px; letter-spacing:.5px; color:#fff;
    background:rgba(10,7,18,.5); border:1px solid rgba(246,210,122,.28); border-radius:16px; padding:8px 16px;
    -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
    text-shadow:0 2px 10px rgba(0,0,0,.85); box-shadow:0 4px 20px rgba(0,0,0,.4);
    opacity:0; transform:translate(-50%,8px); transition:all .35s ease;
  }
  .toast.show{ opacity:1; transform:translate(-50%,0); }

  /* —— 庆祝时压暗文字层，让烟花造型成为主角（修复"被字遮挡"）—— */
  .stage,.textglow,.vignette{ transition:opacity .55s ease; }
  body.party .stage{ opacity:.2; }
  body.party .textglow{ opacity:.35; }
  body.party .vignette{ opacity:.28; }

  /* —— 等级 + 经验条 ——（注意：不要写 position:relative，会覆盖原 fixed 让计数器跑到左上角被切；
     fixed 本身已是 xpfill 的定位上下文）*/
  .score{ overflow:hidden; display:inline-flex; gap:8px; align-items:center;
          transition:box-shadow .3s ease, border-color .3s ease; }
  .score .lvtag{ color:#ffe6a8; font-weight:700; letter-spacing:.5px; }
  .xpfill{ position:absolute; left:0; bottom:0; height:3px; width:0%;
           background:linear-gradient(90deg,#f6d27a,#ffb347);
           box-shadow:0 0 8px rgba(246,200,110,.85); transition:width .28s ease; }
  .score.lvflash{ border-color:#ffd86b !important; box-shadow:0 0 22px rgba(255,210,120,.9); }

  /* —— 狂欢「无敌星」模式：暖色脉冲罩 —— */
  .frenzyveil{ position:fixed; inset:0; z-index:2; pointer-events:none; opacity:0;
    background:radial-gradient(120% 92% at 50% 50%, rgba(255,120,60,.14), rgba(255,40,120,.07) 52%, transparent 76%);
    transition:opacity .4s ease; }
  body.frenzy .frenzyveil{ opacity:1; animation:frenzyPulse 1.1s ease-in-out infinite; }
  @keyframes frenzyPulse{ 0%,100%{ filter:hue-rotate(0deg); opacity:.7;} 50%{ filter:hue-rotate(45deg); opacity:1;} }
  body.frenzy .score{ border-color:rgba(255,180,80,.85); box-shadow:0 0 20px rgba(255,150,60,.65); }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="grain"></div>
<div class="vignette"></div>
<div class="textglow"></div>
<div class="frenzyveil"></div>

<div class="stage">
  <div class="eyebrow rise">Happy Birthday</div>
  <div class="name rise">红豆</div>
  <div class="greet rise">生日快乐</div>
  <div class="rule rise"><i></i><b>❋</b><i></i></div>
  <div class="poem rise" id="poem">红豆生南国，春来发几枝</div>
  <div class="bless rise">愿你岁岁常欢愉，年年皆胜意<br>所求皆所愿，所行皆坦途</div>
</div>
<canvas id="fg" class="fg"></canvas>
<div id="score" class="score"><span class="lvtag">Lv.<b id="cLv">1</b></span><span>🎆<b id="cFw">0</b></span><span>❤<b id="cHt">0</b></span><i id="xpfill" class="xpfill"></i></div>
<div id="combo" class="combo"></div>
<div id="toast" class="toast"></div>
<div id="hint" class="hint">轻 触 夜 空 · 为 你 绽 放</div>
<label id="haplbl" aria-hidden="true" style="position:fixed;left:-9999px;top:0;width:1px;height:1px;overflow:hidden;opacity:0;"><input type="checkbox" switch></label>

<script>
(() => {
  const cv  = document.getElementById('sky');
  const ctx = cv.getContext('2d');
  const fg  = document.getElementById('fg');
  const fgx = fg.getContext('2d');
  const TAU = Math.PI * 2;
  const rnd = (a = 1, b = 0) => b + Math.random() * (a - b);

  let W = 0, H = 0, DPR = 1, fadeGrad = null, stars = [], embers = [];

  function resize(){
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = Math.floor(W*DPR); cv.height = Math.floor(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    fg.width = cv.width; fg.height = cv.height; fgx.setTransform(DPR,0,0,DPR,0,0);
    const en = Math.max(10, Math.round(W/42));
    embers = Array.from({length:en}, () => ({
      x:rnd(W), y:rnd(H), r:rnd(48,16),
      hue:[45,348,330,280,200][(Math.random()*5)|0]+rnd(12,-12),
      vx:rnd(0.18,-0.18), vy:rnd(-0.2,-0.6), a:rnd(0.13,0.05), ph:rnd(TAU), tw:rnd(0.55,0.18)
    }));
    fadeGrad = ctx.createLinearGradient(0,0,0,H);
    fadeGrad.addColorStop(0,'rgba(6,7,20,0.16)');
    fadeGrad.addColorStop(0.6,'rgba(8,7,16,0.16)');
    fadeGrad.addColorStop(1,'rgba(18,8,14,0.18)');
    const n = Math.round((W*H)/9000);
    stars = Array.from({length:n}, () => ({
      x:rnd(W), y:rnd(H*0.92), r:rnd(1.3,0.3),
      hue:rnd(1)<0.7?rnd(50,38):rnd(210,195), base:rnd(0.5,0.12), tw:rnd(0.9,0.2), ph:rnd(TAU)
    }));
  }

  function shellHue(){
    // 绚烂高饱和：暖色稍多，但避开接近白的金黄
    const warm=[348,332,318,12,28,0];
    const cool=[280,265,200,222,150,308];
    return (Math.random()<0.58?warm:cool)[(Math.random()*6)|0] + rnd(9,-9);
  }

  let particles = [], rockets = [], flashes = [], meteors = [];
  const MAX = 2400;
  const spawn = p => { if (particles.length < MAX) particles.push(p); };

  class Rocket{
    constructor(tx,ty,boost){
      this.x=rnd(W*0.72,W*0.28); this.y=H+8;
      this.tx=tx!=null?tx:rnd(W*0.82,W*0.18); this.ty=ty!=null?ty:rnd(H*0.46,H*0.16);
      const f=rnd(62,48); this.vx=(this.tx-this.x)/f; this.vy=(this.ty-this.y)/f;
      this.life=f; this.hue=shellHue(); this.wob=rnd(TAU); this.boost=boost||1;
    }
    step(){
      this.wob+=0.3; const px=this.x,py=this.y;
      this.x+=this.vx+Math.cos(this.wob)*0.4; this.y+=this.vy;
      spawn({x:this.x,y:this.y,px,py,vx:rnd(.2,-.2),vy:rnd(.5,.1),hue:44,sat:90,light:78,
             life:0,max:16,w:1.6,fr:.9,g:0,twk:false,head:true});
      if (--this.life<=0){ burst(this.x,this.y,this.hue,this.boost); return false; } return true;
    }
    draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,2,0,TAU);
            ctx.fillStyle=`hsla(${this.hue},90%,82%,${0.95*bgDim})`; ctx.fill(); }
  }

  function flash(x,y,hue,maxr){ flashes.push({x,y,hue,r:4,mr:maxr,a:1}); }

  // iMessage 风格密集爆裂：半径 ≈ 近半屏、停留更久
  function burst(x,y,hue,boost){
    boost = boost||1;
    const roll=Math.random();
    if (roll<0.08){ heartBurst(x,y); return; }
    const willow = roll<0.22;
    const fr = 0.93;                                   // 摩擦更小→扩得更远更慢
    const R  = Math.min(W,H) * (willow ? rnd(0.36,0.28) : rnd(0.48,0.38)) * boost; // 目标半径（连击放大）
    const v0 = R*(1-fr)/fr;                            // 让外圈粒子恰好到达 R
    flash(x,y,hue, R*0.72);
    const N=200+(Math.random()*100|0);
    for (let i=0;i<N;i++){
      const ang=rnd(TAU), sp=Math.sqrt(Math.random())*v0+rnd(.4);  // 开方分布→实心圆
      spawn({x,y,px:x,py:y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
             hue:(willow?44:hue)+rnd(16,-16), sat:willow?rnd(95,85):rnd(100,92), light:rnd(62,50),
             life:0, max:willow?rnd(240,185):rnd(215,150), w:rnd(2.7,1.5),
             fr, g:willow?rnd(.10,.07):rnd(.05,.028), twk:Math.random()<0.55, head:true});
    }
    const G=24+(Math.random()*16|0);
    for (let i=0;i<G;i++){
      const ang=rnd(TAU), sp=Math.sqrt(Math.random())*v0*0.7;
      spawn({x,y,px:x,py:y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
             hue:hue+rnd(22,-22), sat:92, light:80, life:0, max:rnd(230,150), w:1.2, fr:.94, g:.02, twk:true, head:false});
    }
  }

  function heartBurst(x,y){
    const fr=0.92, factor=fr/(1-fr);
    const Hh=Math.min(W,H)*rnd(0.34,0.26), k=Hh/(17*factor);   // 爱心高度 ≈ 屏幕的 0.26~0.34
    flash(x,y,348,Hh*0.7);
    const hueH=[348,352,335][(Math.random()*3)|0], N=150;
    for (let i=0;i<N;i++){
      const t=(i/N)*TAU;
      const hx=16*Math.pow(Math.sin(t),3);
      const hy=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
      spawn({x,y,px:x,py:y,vx:hx*k,vy:-hy*k,hue:hueH+rnd(8,-8),sat:98,light:rnd(64,54),
             life:0,max:rnd(235,185),w:rnd(2.6,1.5),fr,g:.022,twk:Math.random()<.4,head:true});
    }
  }

  // 庆祝时压暗文字层 + 背景烟花(spotlight)，让烟花造型清晰可见（造型粒子本身不调暗）
  let partyTimer=null, bgTimer=null, bgDim=1, bgDimTarget=1;
  function party(ms){ document.body.classList.add('party'); bgDimTarget=0.22;
    clearTimeout(partyTimer); partyTimer=setTimeout(()=>document.body.classList.remove('party'), ms);
    clearTimeout(bgTimer);   bgTimer=setTimeout(()=>{ bgDimTarget=1; }, Math.min(ms,1500)); }

  // 🎆 文字/表情 烟花：像素采样→火星汇聚成形（emoji 用真实颜色，文字用彩虹渐变）
  // opt: {cyFrac, cx, cy, colored, scale, mini}  mini=小惊喜（不压暗文字、不放陪衬烟花）
  function glyphBurst(str, opt){
    opt=opt||{};
    const colored = !!opt.colored, scaleMul = opt.scale||1, mini=!!opt.mini, fs=180;
    const font = colored ? `${fs}px "Apple Color Emoji","Noto Color Emoji","Segoe UI Emoji",sans-serif`
                         : `700 ${fs}px "PingFang SC","Microsoft YaHei",sans-serif`;
    const oc=document.createElement('canvas'), o2=oc.getContext('2d');
    o2.font=font;
    const wpx=Math.ceil(o2.measureText(str).width)+24;
    oc.width=Math.max(wpx,fs+24); oc.height=Math.ceil(fs*1.5);
    o2.font=font; o2.textBaseline='middle'; if(!colored) o2.fillStyle='#fff';
    o2.fillText(str,12,oc.height/2);
    const img=o2.getImageData(0,0,oc.width,oc.height).data;
    let pts=[]; const step=3;
    for (let y=0;y<oc.height;y+=step) for (let x=0;x<oc.width;x+=step){
      const idx=(y*oc.width+x)*4;
      if (img[idx+3]>150) pts.push([x,y,img[idx],img[idx+1],img[idx+2]]);
    }
    if (!pts.length) return;
    const MAXP = mini?320:(colored?1100:1600);   // 取样更密 → 更清晰；文字笔画多，给更多点
    if (pts.length>MAXP){ const k=pts.length/MAXP,out=[]; for(let i=0;i<MAXP;i++) out.push(pts[(i*k)|0]); pts=out; }
    const cx = opt.cx!=null?opt.cx:W/2;
    const cy = opt.cy!=null?opt.cy:H*(opt.cyFrac!=null?opt.cyFrac:0.2);
    // emoji 充满大半屏；文字按"字高"定尺寸（单字不被拉太大而稀疏，多字也不至于太小）
    const sc = colored ? (Math.min(W*0.86,540)*scaleMul)/oc.width
                       : Math.min(H*0.2/oc.height, W*0.88/oc.width)*scaleMul;
    const ox=cx-oc.width*sc/2, oy=cy-oc.height*sc/2;
    const br=v=>Math.min(255,Math.round(v*1.12+20));   // 更接近真实色，蛋糕/独角兽等更易认
    if (!mini) party(2400);
    flash(cx,cy,colored?45:330, mini?100:180);
    for (const [px,py,r,g,bl] of pts){
      const o={ text:true, x:cx+rnd(44,-44), y:cy+rnd(30,-30), tx:ox+px*sc, ty:oy+py*sc,
                life:0, max:rnd(450,380), w:rnd(1.85,1.15), twk:Math.random()<.26 };   // 点更小更密、闪烁更少 → 更锐利
      if (colored) o.rgb=`${br(r)},${br(g)},${br(bl)}`;     // emoji 真实颜色
      else { o.hue=44+rnd(7,-7); o.light=rnd(80,66); }      // 文字：暖金书法色（纯色比彩虹更易认）
      particles.push(o);   // 直接入池、绕过 MAX 上限：连击/狂欢粒子打满时，造型也不会缺粒子残缺
    }
    // 形状下方点缀两朵小烟花助兴（不盖住形状）
    if (!mini) for (let i=0;i<2;i++) setTimeout(()=>burst(rnd(W*0.72,W*0.28), cy+rnd(170,110), shellHue()), 700+i*320);
  }
  function textBurst(str, cyFrac){ glyphBurst(str, {cyFrac:cyFrac}); }

  function spawnMeteor(){
    const dir = Math.random()<0.5?1:-1;
    const x = dir>0 ? rnd(W*0.5,0) : rnd(W,W*0.5);
    meteors.push({ x, y:rnd(H*0.34,10), vx:dir*rnd(11,6), vy:rnd(5,2.5), life:0, max:rnd(64,42), hue:rnd(56,40) });
  }

  function finale(x,y){
    for (let i=0;i<8;i++) setTimeout(()=>rockets.push(new Rocket(rnd(W*0.85,W*0.15), rnd(H*0.42,H*0.16))), i*150);
    setTimeout(()=>textBurst('生日快乐',0.19), 480);
    setTimeout(()=>heartBurst(rnd(W*0.66,W*0.34), rnd(H*0.5,H*0.32)), 1000);
  }

  // ====== 主循环 ======
  let autoTimer=0, meteorTimer=260;
  function tick(){
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle=fadeGrad; ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';

    const time=performance.now()*0.001;
    bgDim += (bgDimTarget-bgDim)*0.08;   // 特效期间背景烟花渐暗，让造型更突出
    for (const s of stars){
      const a=s.base+Math.sin(time*s.tw+s.ph)*s.base*0.8;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU);
      ctx.fillStyle=`hsla(${s.hue},70%,86%,${Math.max(0,a)})`; ctx.fill();
    }

    const hg=ctx.createRadialGradient(W/2,H+40,10,W/2,H+40,H*0.6);
    hg.addColorStop(0,'rgba(120,40,30,0.10)'); hg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=hg; ctx.fillRect(0,H*0.55,W,H*0.45);

    // 流星
    if (--meteorTimer<=0){ if(Math.random()<0.5) spawnMeteor(); meteorTimer=(rnd(420,200))|0; }
    for (let i=meteors.length-1;i>=0;i--){
      const m=meteors[i]; m.x+=m.vx; m.y+=m.vy; m.life++;
      const k=1-m.life/m.max; if(k<=0){ meteors.splice(i,1); continue; }
      const tx=m.x-m.vx*4, ty=m.y-m.vy*4;
      const g=ctx.createLinearGradient(m.x,m.y,tx,ty);
      g.addColorStop(0,`hsla(${m.hue},90%,88%,${k})`); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.strokeStyle=g; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(m.x,m.y); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.beginPath(); ctx.arc(m.x,m.y,1.6,0,TAU); ctx.fillStyle=`hsla(${m.hue},90%,95%,${k})`; ctx.fill();
    }

    for (let i=flashes.length-1;i>=0;i--){
      const f=flashes[i]; const fa=f.a*bgDim;
      const g=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
      g.addColorStop(0,   `hsla(${f.hue},85%,90%,${fa})`);
      g.addColorStop(0.22,`hsla(${f.hue},100%,66%,${fa*0.7})`);
      g.addColorStop(0.55,`hsla(${f.hue},100%,54%,${fa*0.34})`);  // 彩色光晕环
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(f.x-f.r,f.y-f.r,f.r*2,f.r*2);
      f.r+=(f.mr-f.r)*0.18; f.a*=0.86; if(f.a<0.025) flashes.splice(i,1);  // 扩得更慢、停留更久
    }

    rockets=rockets.filter(r=>{ const a=r.step(); if(a) r.draw(); return a; });

    ctx.lineCap='round';
    for (let i=particles.length-1;i>=0;i--){
      const p=particles[i];

      if (p.text){                                   // 文字/表情烟花：缓动汇聚 + 长停留
        p.x+=(p.tx-p.x)*0.2; p.y+=(p.ty-p.y)*0.2; p.life++;     // 收拢更快、定位更稳 → 边缘更锐
        const prog=p.life/p.max; if(prog>=1){ particles.splice(i,1); continue; }
        let a = prog<0.1 ? prog/0.1 : (prog>0.82 ? (1-prog)/0.18 : 1);   // 成形更快、满亮停留更久
        if (p.twk) a*=(Math.random()<0.85?1:0.6);
        if (p.rgb){                                  // emoji：真实色用 source-over，密集也不糊白
          ctx.globalCompositeOperation='source-over';
          ctx.beginPath(); ctx.arc(p.x,p.y,p.w,0,TAU); ctx.fillStyle=`rgba(${p.rgb},${a})`; ctx.fill();
          ctx.globalCompositeOperation='lighter';
          ctx.beginPath(); ctx.arc(p.x,p.y,p.w*1.5,0,TAU); ctx.fillStyle=`rgba(${p.rgb},${a*0.05})`; ctx.fill();
        } else {                                     // 文字：暖金实心点(source-over) + 一点辉光，笔画清楚
          ctx.globalCompositeOperation='source-over';
          ctx.beginPath(); ctx.arc(p.x,p.y,p.w,0,TAU); ctx.fillStyle=`hsla(${p.hue},92%,${p.light}%,${a})`; ctx.fill();
          ctx.globalCompositeOperation='lighter';
          ctx.beginPath(); ctx.arc(p.x,p.y,p.w*1.7,0,TAU); ctx.fillStyle=`hsla(${p.hue},95%,70%,${a*0.10})`; ctx.fill();
        }
        continue;
      }

      p.px=p.x; p.py=p.y;
      p.vx*=p.fr; p.vy*=p.fr; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.life++;
      const k=1-p.life/p.max; if(k<=0){ particles.splice(i,1); continue; }
      let a=k*k*bgDim; if(p.twk&&k<0.7) a*=(Math.random()<0.6?1:0.28);
      if (p.head){                                    // 彩色柔光晕（bloom）
        ctx.beginPath(); ctx.arc(p.x,p.y,p.w*2.6,0,TAU);
        ctx.fillStyle=`hsla(${p.hue},100%,58%,${a*0.13})`; ctx.fill();
      }
      ctx.strokeStyle=`hsla(${p.hue},${p.sat}%,${p.light}%,${a})`;   // 浓色拖尾
      ctx.lineWidth=p.w*(0.35+0.65*k);
      ctx.beginPath(); ctx.moveTo(p.px,p.py); ctx.lineTo(p.x,p.y); ctx.stroke();
      if (p.head&&k>0.45){ ctx.beginPath(); ctx.arc(p.x,p.y,p.w*0.55,0,TAU);
                          ctx.fillStyle=`hsla(${p.hue},95%,78%,${a})`; ctx.fill(); }  // 亮核带色，不纯白
    }

    if (--autoTimer<=0){
      const barrage=Math.random()<0.28?2+(Math.random()*2|0):1;
      for (let b=0;b<barrage;b++) setTimeout(()=>rockets.push(new Rocket()), b*240);
      autoTimer=(rnd(105,70))|0;
    }

    // 前景虚化光斑（在文字前面缓缓漂动 → 景深层次）
    fgx.clearRect(0,0,W,H);
    fgx.globalCompositeOperation='lighter';
    for (const e of embers){
      e.x+=e.vx; e.y+=e.vy;
      if (e.y<-e.r){ e.y=H+e.r; e.x=rnd(W); }
      if (e.x<-e.r) e.x=W+e.r; else if (e.x>W+e.r) e.x=-e.r;
      const a=Math.max(0, e.a*(0.6+0.4*Math.sin(time*e.tw+e.ph))*bgDim);
      const g=fgx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
      g.addColorStop(0,`hsla(${e.hue},90%,70%,${a})`);
      g.addColorStop(1,`hsla(${e.hue},90%,60%,0)`);
      fgx.fillStyle=g; fgx.beginPath(); fgx.arc(e.x,e.y,e.r,0,TAU); fgx.fill();
    }

    requestAnimationFrame(tick);
  }

  // ====== 手机震动（触感反馈）======
  // 安卓浏览器支持 navigator.vibrate；iOS Safari/微信不支持网页振动（系统限制），用 <input switch> 触感兜底
  // （新版 Safari 偶尔有效，微信内多半无效；且 iPhone 侧边静音键打开时也不会震）
  const haplbl=document.getElementById('haplbl');
  const HAS_VIB = 'vibrate' in navigator;
  function buzz(p){
    if (HAS_VIB){ try{ navigator.vibrate(p); }catch(e){} return; }
    try{ haplbl.click(); }catch(e){}
  }

  // ====== 计数 / 等级 / 连击 / 里程碑 ======
  const cFw=document.getElementById('cFw'), cHt=document.getElementById('cHt');
  const cLv=document.getElementById('cLv'), xpfill=document.getElementById('xpfill');
  const scoreEl=document.getElementById('score');
  const comboEl=document.getElementById('combo'), toastEl=document.getElementById('toast');
  let fw=0, ht=0, combo=0, lastFw=0, comboHideTimer=null, toastTimer=null;
  let xp=0, level=1;
  function bump(el,val){ el.textContent=val; el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
  function showCombo(n){
    let t='连击 ×'+n+' 🔥';
    if (!frenzy && n>=8 && n<FRENZY_AT) t='再连 '+(FRENZY_AT-n)+' 次 → 狂欢 🌟';
    comboEl.textContent=t; comboEl.classList.add('show');
    clearTimeout(comboHideTimer); comboHideTimer=setTimeout(()=>comboEl.classList.remove('show'),1000); }
  function showToast(msg){ toastEl.textContent=msg; toastEl.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2300); }
  function barrage(n){ for(let i=0;i<n;i++) setTimeout(()=>rockets.push(new Rocket()), i*170); }
  function grandBarrage(n){ for(let i=0;i<n;i++) setTimeout(()=>rockets.push(new Rocket(rnd(W*0.86,W*0.14),rnd(H*0.46,H*0.15),1.2)), i*140); }

  // —— 等级 + 经验条：每点都在涨，几下就升一级（持续正反馈，几乎立刻有奖励）——
  function threshFor(L){ return 2*(L-1)*L; }            // Lv1:0 Lv2:4 Lv3:12 Lv4:24 …（间隔每级 +4）
  function updateXp(){
    const cur=threshFor(level), nxt=threshFor(level+1);
    xpfill.style.width=(Math.max(0,Math.min(1,(xp-cur)/(nxt-cur)))*100).toFixed(1)+'%';
  }
  function onLevelUp(L){
    bump(cLv,L); scoreEl.classList.add('lvflash'); buzz(L%5===0?[0,25,40,25]:16);
    setTimeout(()=>scoreEl.classList.remove('lvflash'),650);
    if (L%10===0){ showToast('Lv.'+L+' · 满天等级 🎆'); barrage(3); }
    else if (L%5===0){ showToast('Lv.'+L+' 升级 🎇'); barrage(2); }
    else rockets.push(new Rocket());                   // 普通升级也犒赏一朵
  }
  function addXp(n){
    xp+=n;
    while (xp>=threshFor(level+1)){ level++; onLevelUp(level); }
    updateXp();
  }

  // —— 里程碑彩蛋：更密、间距更顺、全是吉利数字（emoji 取系统彩色字体，零额外资源）——
  const MILES={
    10  :{emoji:'🎈', msg:'10 朵 · 开张大吉 🎈'},
    30  :{emoji:'🍰', msg:'30 朵 · 先来块蛋糕 🍰'},
    50  :{emoji:'🎉', msg:'50 朵 · 嗨起来 🎉'},
    66  :{text:'顺',  msg:'66 · 顺顺利利'},
    88  :{emoji:'💰', msg:'88 · 恭喜发财 💰'},
    100 :{emoji:'🎂', msg:'100 朵 · 生日蛋糕来啦 🎂', grand:true},
    150 :{emoji:'🌟', msg:'150 朵 · 闪耀全场 🌟'},
    200 :{emoji:'🎊', msg:'200 朵 · 派对开始 🎊'},
    300 :{text:'红豆', msg:'300 朵 · 把名字写满天空'},
    400 :{emoji:'🥳', msg:'400 朵 · 你是派对之王 🥳'},
    520 :{text:'520', msg:'520 · 我爱你 ❤', grand:true},
    666 :{text:'六六大顺', msg:'666 · 六六大顺'},
    777 :{emoji:'🍀', msg:'777 · 幸运降临 🍀'},
    888 :{emoji:'👑', msg:'888 · 今天你最大 👑'},
    999 :{text:'长长久久', msg:'999 · 长长久久'},
    1000:{text:'心想事成', msg:'1000 朵 · 心想事成 🌟', grand:true},
    1314:{text:'一生一世', msg:'1314 · 一生一世 ❤', grand:true},
    2000:{emoji:'🌈', msg:'2000 · 彩虹都来啦 🌈', grand:true},
    3000:{emoji:'🦄', msg:'3000 · 封你为烟花大师 🦄', grand:true},
    5000:{emoji:'🏆', msg:'5000 · 你太宠红豆啦 🏆', grand:true},
    8888:{emoji:'🐉', msg:'8888 · 龙运当头 🐉', grand:true},
    10000:{text:'红豆生日快乐', msg:'10000 朵 · 传奇达成 🎆', grand:true, mega:true},
  };
  function celebrate(m){
    showToast(m.msg);
    buzz(m.mega?[0,55,30,55,30,90]:(m.grand?[0,45,25,45]:[0,30,20,30]));
    if (m.emoji) glyphBurst(m.emoji,{cyFrac:0.22, colored:true, scale:m.mega?1.15:0.95});
    if (m.text)  glyphBurst(m.text, {cyFrac:0.2});
    setTimeout(()=>grandBarrage(m.mega?14:(m.grand?7:3)), 900);   // 先成形，再齐放，避免盖住造型
    if (m.mega){
      for(let i=0;i<6;i++) setTimeout(()=>heartBurst(rnd(W*0.82,W*0.18),rnd(H*0.55,H*0.28)),1400+i*220);
      setTimeout(()=>glyphBurst('👑',{cyFrac:0.52,colored:true,scale:0.7}),1800);
    }
  }

  // —— 随机「?」惊喜掉落：每点小概率天降幸运彩蛋，不靠刷数量（问号砖块感）——
  const LUCKY=['🎁','⭐','🍬','🍀','🧧','🌟','🎈','🍭'];
  function maybeSurprise(){
    if (frenzy || Math.random()>=0.06) return;
    const e=LUCKY[(Math.random()*LUCKY.length)|0];
    setTimeout(()=>{
      glyphBurst(e,{ cx:rnd(W*0.78,W*0.22), cy:rnd(H*0.32,H*0.18), colored:true, scale:0.5, mini:true });
      addXp(6); showToast('天降惊喜 '+e+' · 经验 +6');
    }, rnd(480,160));
  }

  function onFirework(xpMul){
    fw++; bump(cFw,fw); addXp(xpMul||1);
    const m=MILES[fw];
    if (m) celebrate(m);
    else if (fw%500===0){ showToast(fw+' 朵 🎆 厉害！'); grandBarrage(4); }
    else if (fw%100===0){ showToast(fw+' 朵 🎆 继续~'); barrage(3); }
    else maybeSurprise();
  }
  function onHeart(){
    ht++; bump(cHt,ht); addXp(1);
    if (ht===100){ showToast('100 颗爱心 💗'); glyphBurst('💗',{cyFrac:0.24,colored:true,scale:0.8}); }
    else if (ht%10===0){ showToast(ht+' 颗爱心 ❤');
      for(let i=0;i<3;i++) setTimeout(()=>heartBurst(rnd(W*0.68,W*0.32),rnd(H*0.5,H*0.3)),i*200); }
  }

  // ====== 狂欢「无敌星」：连击攒满即进入数秒疯狂模式，期间每点必爆大烟花、双倍经验 ======
  const FRENZY_AT=12, FRENZY_MS=6000;
  let frenzy=false, frenzyEnd=-1e9, frenzyTimer=null;
  function enterFrenzy(){
    frenzy=true; document.body.classList.add('frenzy'); buzz([0,40,20,40,20,40,20,80]);
    showToast('🌟 狂欢模式！6 秒内疯狂点 🌟');
    grandBarrage(4);
    clearTimeout(frenzyTimer); frenzyTimer=setTimeout(endFrenzy, FRENZY_MS);
  }
  function endFrenzy(){
    frenzy=false; frenzyEnd=performance.now(); document.body.classList.remove('frenzy');
    showToast('狂欢结束 · 真棒 ✨');
  }

  // ====== 手势：点夜空放烟花(连点放大) / 点名字比心 / 长按 finale ======
  const nameEl=document.querySelector('.name');
  let lpTimer=null, lpFired=false, downName=false;
  function hitName(x,y){
    const r=nameEl.getBoundingClientRect();
    return x>=r.left-12 && x<=r.right+12 && y>=r.top-8 && y<=r.bottom+8;
  }
  cv.addEventListener('pointerdown', e=>{
    lpFired=false;
    const x=e.clientX, y=e.clientY; downName=hitName(x,y);
    lpTimer=setTimeout(()=>{ lpFired=true; lpTimer=null;
      if (downName){ for(let i=0;i<5;i++) setTimeout(()=>{ heartBurst(rnd(W*0.7,W*0.3),rnd(H*0.55,H*0.28)); onHeart(); }, i*180); }
      else finale(x,y);
    }, 560);
  }, {passive:true});
  cv.addEventListener('pointerup', e=>{
    if (lpTimer){ clearTimeout(lpTimer); lpTimer=null; }
    if (lpFired) return;                              // 长按已触发，吞掉这次抬手
    const x=e.clientX, y=e.clientY, now=performance.now();
    if (hitName(x,y)){                                // 点名字「红豆」→ 比心
      heartBurst(x, y); onHeart(); combo=0; buzz(10);
    } else if (frenzy){                               // 狂欢模式：每点必爆大彩烟、双倍经验
      const r=new Rocket(x, Math.min(y,H*0.5), 1.55); r.hue=shellHue(); rockets.push(r);
      onFirework(2); buzz(18);
    } else {                                          // 点夜空 → 放烟花 + 连点放大
      combo = (now-lastFw<820) ? combo+1 : 1; lastFw=now;
      const boost = 1 + Math.min((combo-1)*0.07, 0.6);
      if (y<H*0.6) rockets.push(new Rocket(x,y,boost)); else burst(x,y-4,shellHue(),boost);
      onFirework(); buzz(13);
      if (combo>=3) showCombo(combo);
      if (combo>=FRENZY_AT && now-frenzyEnd>4000) enterFrenzy();   // 攒满连击 → 无敌星
    }
  }, {passive:true});
  cv.addEventListener('pointercancel', ()=>{ if(lpTimer){clearTimeout(lpTimer);lpTimer=null;} }, {passive:true});

  // ====== 音乐：Web Audio 合成《Happy Birthday》八音盒 ======
  const F={G4:392,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99};
  const HB=[
    [F.G4,.75],[F.G4,.25],[F.A4,1],[F.G4,1],[F.C5,1],[F.B4,2],
    [F.G4,.75],[F.G4,.25],[F.A4,1],[F.G4,1],[F.D5,1],[F.C5,2],
    [F.G4,.75],[F.G4,.25],[F.G5,1],[F.E5,1],[F.C5,1],[F.B4,1],[F.A4,2],
    [F.F5,.75],[F.F5,.25],[F.E5,1],[F.C5,1],[F.D5,1],[F.C5,2]
  ];
  const BASE_BEAT=0.46, VOL=0.3;   // 常开背景乐，音量调柔
  let actx=null, master=null, started=false, muted=false, loopTimer=null, loopCount=0;
  function initAudio(){
    if (actx) return true;
    try{ actx=new (window.AudioContext||window.webkitAudioContext)();
         master=actx.createGain(); master.gain.value=VOL; master.connect(actx.destination);
         // iOS 解锁：在手势内播放 1 帧静音
         const b=actx.createBuffer(1,1,22050), s=actx.createBufferSource();
         s.buffer=b; s.connect(actx.destination); s.start(0);
         return true; }catch(e){ return false; }
  }
  function note(freq,start,dur){
    const g=actx.createGain();
    g.gain.setValueAtTime(0.0001,start);
    g.gain.exponentialRampToValueAtTime(0.9,start+0.012);
    g.gain.exponentialRampToValueAtTime(0.0008,start+Math.max(0.12,dur*0.92));
    g.connect(master);
    const o=actx.createOscillator(); o.type='triangle'; o.frequency.value=freq; o.connect(g); o.start(start); o.stop(start+dur+0.02);
    const o2=actx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2;
    const g2=actx.createGain(); g2.gain.value=0.22; o2.connect(g2); g2.connect(g); o2.start(start); o2.stop(start+dur+0.02);
  }
  function playHB(){
    if (!actx || muted) return;
    const speed = loopCount===0 ? 1 : rnd(2.4, 0.75);   // 第一遍正常，其后每遍随机变速 0.75x–2.4x
    loopCount++;
    const beat = BASE_BEAT/speed;
    let t=actx.currentTime+0.12; const t0=t;             // lead 0.12s 吸收 resume 延迟
    for (const [f,d] of HB){
      note(f,t,d*beat);
      if (d>=1.9){ const delay=(t-actx.currentTime)*1000;     // 乐句收尾放一朵烟花
                   setTimeout(()=>rockets.push(new Rocket()), Math.max(0,delay)); }
      t+=d*beat;
    }
    const total=t-t0;
    clearTimeout(loopTimer);
    loopTimer=setTimeout(()=>{ if(!muted) playHB(); }, (total+rnd(0.9,0.4))*1000);
  }
  function resumeThen(cb){
    if (!actx) return;
    if (actx.state==='running') cb();
    else actx.resume().then(cb).catch(cb);
  }
  // 音乐常开、不可关；任意手势或微信桥就绪即起音
  // 关键修复：必须 AudioContext 真正 running 后才标记 started；否则每次手势都重试 resume
  // （旧 bug：微信桥事件里没手势、resume 失败也置 started=真 → 之后真实点击不再重试 → 一直没声音）
  function tryStart(){
    if (started || !initAudio()) return;
    const go=()=>{ if (!started && actx.state==='running'){ started=true; playHB(); } };
    if (actx.state==='running') go();
    else actx.resume().then(go).catch(()=>{});
  }
  function wxUnlock(){                                     // 微信标准解锁：invoke 网络类型，在其回调里起音
    if (window.WeixinJSBridge){ try{ WeixinJSBridge.invoke('getNetworkType',{}, tryStart); }catch(e){ tryStart(); } }
    else tryStart();
  }
  if (window.WeixinJSBridge) wxUnlock();
  document.addEventListener('WeixinJSBridgeReady', wxUnlock, false);
  ['touchstart','touchend','click','pointerup','pointerdown'].forEach(ev=>  // 各环境：任意手势都尝试解锁
    document.addEventListener(ev, tryStart, {capture:true, passive:true}));

  // ====== 提示语轮播（悄悄教手势） ======
  const hintEl=document.getElementById('hint');
  const HINTS=['轻 触 夜 空 · 绽 放 烟 花','连 点 越 快 · 烟 花 越 大 🔥','连 满 12 · 解 锁 狂 欢 🌟','点「红 豆」· 为 她 比 心 ❤','长 按 · 满 天 花 火 🎆','一 直 点 · 处 处 是 惊 喜 🎁'];
  let hi=0;
  setInterval(()=>{
    hintEl.style.opacity='0';
    setTimeout(()=>{ hi=(hi+1)%HINTS.length; hintEl.textContent=HINTS[hi]; hintEl.style.opacity='0.6'; }, 600);
  }, 5000);

  // ====== 启动 ======
  resize();
  window.addEventListener('resize', resize);
  [380,760,1180,1620,2200].forEach(t=>setTimeout(()=>rockets.push(new Rocket(rnd(W*0.72,W*0.28), rnd(H*0.4,H*0.18))), t));
  setTimeout(()=>textBurst('生日快乐',0.19), 5200);    // 开场惊喜：天上写字
  setInterval(()=>textBurst('生日快乐',0.19), 42000);  // 每隔约 42s 再现一次

  // ── 诗句轮换：逐字「书写」式淡入 + 整行上飘淡出 ───────────────
  const poemEl = document.getElementById('poem');
  const POEMS = [
    '红豆生南国，春来发几枝',   // 王维《相思》
    '但愿人长久，千里共婵娟',   // 苏轼《水调歌头》
    '玲珑骰子安红豆，入骨相思知不知', // 温庭筠
    '海内存知己，天涯若比邻',   // 王勃
    '愿君多采撷，此物最相思',   // 王维《相思》
    '愿你出走半生，归来仍是少年',
  ];
  let poemIdx = 0;
  function fitPoem(){                       // 窄屏自适应：跟视口宽比，太长就逐档缩字号，绝不溢出屏幕
    poemEl.style.fontSize = '';
    const maxW = document.documentElement.clientWidth * 0.9;
    let fs = parseFloat(getComputedStyle(poemEl).fontSize);
    let guard = 0;
    while (poemEl.scrollWidth > maxW && fs > 12 && guard++ < 40){
      fs -= 1; poemEl.style.fontSize = fs + 'px';
    }
  }
  function buildPoem(str){
    let h = '';
    for (let i = 0; i < str.length; i++)
      h += '<span class="pc" style="animation-delay:' + (i*0.05).toFixed(3) + 's">' + str[i] + '</span>';
    return h;
  }
  let poemTimer = null;
  function schedulePoem(){ clearTimeout(poemTimer); poemTimer = setTimeout(rotatePoem, 5200); }
  function rotatePoem(){
    poemEl.style.opacity = '0'; poemEl.style.transform = 'translateY(-9px)'; poemEl.style.filter = 'blur(3px)';
    setTimeout(() => {
      poemIdx = (poemIdx + 1) % POEMS.length;
      poemEl.style.transition = 'none';
      poemEl.style.opacity = '1'; poemEl.style.transform = 'none'; poemEl.style.filter = 'none';
      poemEl.innerHTML = buildPoem(POEMS[poemIdx]);
      fitPoem();
      void poemEl.offsetWidth;            // 强制回流：让 .pc 从透明开始逐字入场
      poemEl.style.transition = '';       // 恢复 CSS 过渡
      schedulePoem();
    }, 560);
  }
  fitPoem();        // 首句(rise 入场)也做一次自适应
  schedulePoem();   // 停留 5.2s 后开始轮换

  requestAnimationFrame(tick);
})();
</script>
</body>
