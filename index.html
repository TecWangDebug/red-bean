<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#160407">
<title>红豆</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #160407;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  body {
    background: radial-gradient(125% 95% at 50% 40%, #2a0a10 0%, #15050a 55%, #080205 100%);
  }
  #c { display: block; width: 100vw; height: 100vh; }
  .hint {
    position: fixed; left: 0; right: 0; bottom: calc(env(safe-area-inset-bottom) + 26px);
    text-align: center;
    color: rgba(255, 200, 200, 0.45);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 14px; letter-spacing: 4px;
    pointer-events: none;
    animation: fade 3.6s ease-in-out infinite;
  }
  @keyframes fade { 0%,100% { opacity: .22 } 50% { opacity: .72 } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">轻触 · 红豆生南国</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: true });

  let DPR = 1, W = 0, H = 0;
  let beans = [];        // 3D 红豆粒子
  let embers = [];       // 漂浮火星
  let sparks = [];       // 触摸迸出的火花
  let shocks = [];       // 冲击波光环
  let flash = 0;         // 全屏闪光强度
  let R = 120;           // 红豆基准半径(px)

  const TAU = Math.PI * 2;
  const rnd = (a = 1, b = 0) => b + Math.random() * (a - b);

  // ---- 触摸状态 ----
  const touches = new Map();

  // ============ 生成 3D 红豆点云 ============
  // 红豆 ≈ 长椭球(赤豆细长)。在椭球壳层上撒点，并标记顶部一条“豆脐”接缝。
  function buildBean(count) {
    const a = 1.00, b = 0.60, c = 0.60;   // 长 / 高 / 厚 半轴比例
    const arr = [];
    for (let i = 0; i < count; i++) {
      // 单位球均匀采样
      const u = rnd(1, -1);
      const th = rnd(TAU);
      const r = Math.sqrt(1 - u * u);
      let ux = r * Math.cos(th), uy = u, uz = r * Math.sin(th);
      // 壳层厚度，外密内疏 → 体积感
      const shell = 0.80 + Math.random() * 0.20;
      const x = ux * a * shell;   // 长轴(水平)
      const y = uy * b * shell;   // 高
      const z = uz * c * shell;   // 厚(深度)
      // 豆脐接缝：顶部沿长轴的一条窄线
      const seam = uy > 0.52 && Math.abs(uz) < 0.26;
      arr.push({
        bx: x, by: y, bz: z, seam,
        // 屏幕空间实时位置(受弹簧/触摸影响)
        x: W / 2, y: H / 2, vx: 0, vy: 0,
        size: seam ? 0.9 + Math.random() * 0.7 : 1.1 + Math.random() * 1.5,
        ph: rnd(TAU), sp: 0.6 + Math.random() * 1.6,
        hueSeed: rnd(TAU),
        ease: 0.10 + Math.random() * 0.06,
        flare: 0,
        depth: 1,
      });
    }
    return arr;
  }

  function makeEmber() {
    const ang = rnd(TAU);
    const rad = R * (0.9 + Math.random() * 0.9);
    return {
      x: W / 2 + Math.cos(ang) * rad * 0.7,
      y: H / 2 + Math.abs(Math.sin(ang)) * rad * 0.4 + R * 0.4,
      vx: rnd(0.25, -0.25),
      vy: -(0.25 + Math.random() * 0.55),
      life: 0, max: 140 + Math.random() * 160,
      size: 0.7 + Math.random() * 1.6,
      hue: 6 + Math.random() * 18,
    };
  }

  function init() {
    R = Math.min(W, H) * 0.30;
    // 按屏幕面积定粒子数，兼顾性能
    const area = (W * H) / (390 * 844);
    let count = Math.round(560 * Math.min(1.4, Math.max(0.7, area)));
    count = Math.max(380, Math.min(720, count));
    beans = buildBean(count);
    embers = Array.from({ length: 26 }, makeEmber);
    sparks = []; shocks = []; flash = 0;
  }

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    init();
  }

  // ============ 主循环 ============
  let t = 0;
  // 复用的屏幕坐标/深度数组，给连线用
  const sxA = new Float32Array(900);
  const syA = new Float32Array(900);
  const brightA = new Float32Array(900);

  function frame() {
    t += 0.016;

    // 拖尾：半透明覆盖，留发光余晖
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(11, 3, 6, 0.30)';
    ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = 'lighter';

    const cx = W / 2, cy = H / 2 - H * 0.015;

    // ---- 背景脉动光晕 ----
    const halo = R * (1.7 + Math.sin(t * 0.9) * 0.12);
    const hg = ctx.createRadialGradient(cx, cy, R * 0.1, cx, cy, halo);
    const hp = 0.18 + Math.sin(t * 0.9) * 0.05 + flash * 0.4;
    hg.addColorStop(0, `rgba(255, 60, 70, ${hp})`);
    hg.addColorStop(0.45, `rgba(180, 24, 40, ${hp * 0.5})`);
    hg.addColorStop(1, 'rgba(120, 10, 30, 0)');
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(cx, cy, halo, 0, TAU); ctx.fill();

    // ---- 3D 旋转角 ----
    const yaw = t * 0.42;
    const pitch = Math.sin(t * 0.33) * 0.42 + 0.12;
    const cyaw = Math.cos(yaw), syaw = Math.sin(yaw);
    const cpit = Math.cos(pitch), spit = Math.sin(pitch);
    const focal = R * 3.2;

    const touchArr = [...touches.values()];
    const N = beans.length;

    // ---- 先算每颗粒子的投影位置 + 物理 ----
    for (let i = 0; i < N; i++) {
      const p = beans[i];
      // 旋转：先绕 Y(偏航)，再绕 X(俯仰)
      let x = p.bx * R, y = p.by * R, z = p.bz * R;
      let x1 = x * cyaw + z * syaw;
      let z1 = -x * syaw + z * cyaw;
      let y1 = y * cpit - z1 * spit;
      let z2 = y * spit + z1 * cpit;
      // 透视投影
      const scale = focal / (focal - z2);
      const homeX = cx + x1 * scale;
      const homeY = cy + y1 * scale;
      const depth = (z2 / R + 1) * 0.5;   // 0后 .. 1前
      p.depth = depth;

      // 弹簧回到投影位置
      let ax = (homeX - p.x) * p.ease;
      let ay = (homeY - p.y) * p.ease;

      // 触摸排斥
      for (const tt of touchArr) {
        const dx = p.x - tt.x, dy = p.y - tt.y;
        const d2 = dx * dx + dy * dy;
        const RR = 120;
        if (d2 < RR * RR) {
          const d = Math.sqrt(d2) || 0.001;
          const f = (1 - d / RR);
          const ff = f * f * 7.5;
          ax += (dx / d) * ff; ay += (dy / d) * ff;
        }
      }
      // 冲击波推力
      for (const s of shocks) {
        const dx = p.x - s.x, dy = p.y - s.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
        if (Math.abs(d - s.r) < 50) {
          const f = s.power * (1 - Math.abs(d - s.r) / 50);
          ax += (dx / d) * f; ay += (dy / d) * f;
        }
      }

      p.vx = (p.vx + ax) * 0.80;
      p.vy = (p.vy + ay) * 0.80;
      p.x += p.vx; p.y += p.vy;

      // 随机爆闪
      if (p.flare > 0) p.flare *= 0.88;
      else if (Math.random() < 0.0009) p.flare = 1;

      const tw = 0.6 + 0.4 * Math.sin(t * p.sp + p.ph);
      brightA[i] = (p.seam ? 0.5 : 0.85) * (0.5 + depth * 0.7) * tw + p.flare;
      sxA[i] = p.x; syA[i] = p.y;
    }

    // ---- 星座连线（空间网格找近邻） ----
    drawLinks(N);

    // ---- 画红豆粒子（按深度，近的后画在上层）----
    for (let i = 0; i < N; i++) {
      const p = beans[i];
      const depth = p.depth;
      const tw = 0.6 + 0.4 * Math.sin(t * p.sp + p.ph);
      // 流光变色：红→绯→橙之间缓缓流动
      let hue = 350 + Math.sin(t * 0.5 + p.hueSeed) * 15;
      let light, sat;
      if (p.seam) { light = 24 + depth * 16; sat = 65; }
      else { light = (30 + depth * 30) + tw * 8; sat = 85; }
      const s = p.size * (0.55 + depth * 0.85) * (0.85 + tw * 0.35) + p.flare * 2.2;
      const alpha = Math.min(1, brightA[i]);

      // 前景/爆闪粒子加一层柔光
      if (depth > 0.66 || p.flare > 0.2) {
        ctx.globalAlpha = alpha * 0.28;
        ctx.fillStyle = `hsl(${hue}, ${sat}%, ${Math.min(75, light + 18)}%)`;
        ctx.beginPath(); ctx.arc(p.x, p.y, s * 2.6, 0, TAU); ctx.fill();
      }
      // 爆闪打白
      if (p.flare > 0.3) {
        ctx.globalAlpha = p.flare * 0.9;
        ctx.fillStyle = '#fff6f0';
        ctx.beginPath(); ctx.arc(p.x, p.y, s * 0.8, 0, TAU); ctx.fill();
      }
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `hsl(${hue}, ${sat}%, ${light}%)`;
      ctx.beginPath(); ctx.arc(p.x, p.y, s, 0, TAU); ctx.fill();
    }

    // ---- 漂浮火星 ----
    for (let i = 0; i < embers.length; i++) {
      const e = embers[i];
      e.life++;
      e.x += e.vx; e.y += e.vy;
      e.vy -= 0.0015; e.vx += Math.sin(t + i) * 0.006;
      const lifeR = e.life / e.max;
      if (lifeR >= 1) { embers[i] = makeEmber(); continue; }
      const al = Math.sin(lifeR * Math.PI) * 0.8;
      ctx.globalAlpha = al * 0.4;
      ctx.fillStyle = `hsl(${e.hue}, 90%, 65%)`;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size * 2.4, 0, TAU); ctx.fill();
      ctx.globalAlpha = al;
      ctx.fillStyle = `hsl(${e.hue}, 95%, 78%)`;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, TAU); ctx.fill();
    }

    // ---- 触摸火花 ----
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.life++;
      s.x += s.vx; s.y += s.vy;
      s.vx *= 0.94; s.vy = s.vy * 0.94 + 0.06;
      const lr = s.life / s.max;
      if (lr >= 1) { sparks.splice(i, 1); continue; }
      const al = (1 - lr);
      ctx.globalAlpha = al * 0.5;
      ctx.fillStyle = `hsl(${s.hue}, 95%, 68%)`;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 2.2, 0, TAU); ctx.fill();
      ctx.globalAlpha = al;
      ctx.fillStyle = '#fff2ec';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 0.7, 0, TAU); ctx.fill();
    }

    // ---- 冲击波光环 + 闪光 ----
    for (let i = shocks.length - 1; i >= 0; i--) {
      const s = shocks[i];
      s.r += 11; s.power *= 0.93;
      const a = Math.max(0, 1 - s.r / (Math.max(W, H) * 0.75));
      if (a <= 0.02) { shocks.splice(i, 1); continue; }
      ctx.globalAlpha = a * 0.5;
      ctx.strokeStyle = `hsl(${354}, 90%, 65%)`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, TAU); ctx.stroke();
    }
    if (flash > 0.01) {
      ctx.globalAlpha = flash * 0.5;
      ctx.fillStyle = '#ff5a6a';
      ctx.fillRect(0, 0, W, H);
      flash *= 0.85;
    }

    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(frame);
  }

  // ---- 星座连线：屏幕空间哈希网格，限制每点连线数 ----
  const LINK_R = 30;
  function drawLinks(N) {
    const cell = LINK_R;
    const cols = Math.ceil(W / cell) + 1;
    const grid = new Map();
    for (let i = 0; i < N; i++) {
      const gx = (sxA[i] / cell) | 0, gy = (syA[i] / cell) | 0;
      const key = gx + gy * 100000;
      let bucket = grid.get(key);
      if (!bucket) grid.set(key, bucket = []);
      bucket.push(i);
    }
    ctx.lineWidth = 1;
    const R2 = LINK_R * LINK_R;
    const deg = new Int8Array(N);
    const pulse = 0.4 + 0.3 * Math.sin(t * 1.2);
    for (let i = 0; i < N; i++) {
      if (deg[i] >= 3) continue;
      const xi = sxA[i], yi = syA[i];
      const gx = (xi / cell) | 0, gy = (yi / cell) | 0;
      for (let ox = 0; ox <= 1; ox++) for (let oy = (ox ? -1 : 0); oy <= 1; oy++) {
        const bucket = grid.get((gx + ox) + (gy + oy) * 100000);
        if (!bucket) continue;
        for (const j of bucket) {
          if (j <= i || deg[j] >= 3) continue;
          const dx = xi - sxA[j], dy = yi - syA[j];
          const d2 = dx * dx + dy * dy;
          if (d2 < R2) {
            const a = (1 - d2 / R2) * Math.min(brightA[i], brightA[j]) * pulse * 0.85;
            if (a < 0.02) continue;
            ctx.globalAlpha = Math.min(0.6, a);
            ctx.strokeStyle = '#ff6b7e';
            ctx.beginPath();
            ctx.moveTo(xi, yi); ctx.lineTo(sxA[j], syA[j]);
            ctx.stroke();
            deg[i]++; deg[j]++;
            if (deg[i] >= 3) break;
          }
        }
        if (deg[i] >= 3) break;
      }
    }
  }

  // ============ 触摸交互 ============
  function spawnSparks(x, y, n) {
    for (let i = 0; i < n && sparks.length < 220; i++) {
      const a = rnd(TAU), sp = rnd(4.5, 1);
      sparks.push({
        x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 0, max: 26 + Math.random() * 24,
        size: 0.8 + Math.random() * 1.4,
        hue: 350 + Math.random() * 25,
      });
    }
  }
  function onStart(e) {
    e.preventDefault();
    for (const tch of e.changedTouches ? e.changedTouches : [e]) {
      const id = tch.identifier ?? 'mouse';
      touches.set(id, { x: tch.clientX, y: tch.clientY });
      shocks.push({ x: tch.clientX, y: tch.clientY, r: 0, power: 8 });
      spawnSparks(tch.clientX, tch.clientY, 16);
      flash = Math.min(0.6, flash + 0.35);
    }
  }
  function onMove(e) {
    e.preventDefault();
    for (const tch of e.changedTouches ? e.changedTouches : [e]) {
      const id = tch.identifier ?? 'mouse';
      if (touches.has(id)) {
        touches.set(id, { x: tch.clientX, y: tch.clientY });
        if (Math.random() < 0.5) spawnSparks(tch.clientX, tch.clientY, 2);
      }
    }
  }
  function onEnd(e) {
    e.preventDefault();
    for (const tch of e.changedTouches ? e.changedTouches : [e]) {
      touches.delete(tch.identifier ?? 'mouse');
    }
  }

  canvas.addEventListener('touchstart', onStart, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onEnd, { passive: false });
  canvas.addEventListener('touchcancel', onEnd, { passive: false });
  let mdown = false;
  canvas.addEventListener('mousedown', e => { mdown = true; onStart(e); });
  canvas.addEventListener('mousemove', e => { if (mdown) onMove(e); });
  window.addEventListener('mouseup', e => { mdown = false; onEnd(e); });

  window.addEventListener('resize', () => {
    clearTimeout(window.__rz);
    window.__rz = setTimeout(resize, 200);
  });

  resize();
  frame();
})();
</script>
</body>
</html>
